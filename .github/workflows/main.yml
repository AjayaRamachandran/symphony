on:
  push:
    branches:
    - release-mac
    - release-win64

jobs:
  build-mac:
    name: Build on macOS
    if: github.ref == 'refs/heads/release-mac'
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install SDL2 (pygame build fallback)
      run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf
    - name: Install dependencies
      run: npm install
    - name: Package app for Mac
      run: npm run package-app:mac
    - name: Locate dmg installer
      shell: bash
      run: |
        shopt -s nullglob
        installers=(src-tauri/target/release/bundle/dmg/*.dmg)
        if [ "${#installers[@]}" -ne 1 ]; then
          echo "Expected exactly one dmg installer, found ${#installers[@]}." >&2
          printf '%s\n' "${installers[@]}" >&2
          exit 1
        fi
        echo "INSTALLER_PATH=${installers[0]}" >> "$GITHUB_ENV"
    - name: Upload dmg installer
      uses: actions/upload-artifact@v4
      with:
        name: app-mac-dmg
        path: ${{ env.INSTALLER_PATH }}
        if-no-files-found: error

  build-windows:
    name: Build on Windows
    if: github.ref == 'refs/heads/release-win64'
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: npm install
    - name: Package app for Windows
      run: npm run package-app:windows
    - name: Locate NSIS installer
      shell: pwsh
      run: |
        $installers = @(Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -File)
        if ($installers.Count -ne 1) {
          Write-Error "Expected exactly one NSIS setup.exe installer, found $($installers.Count)."
          $installers | ForEach-Object { Write-Error $_.FullName }
          exit 1
        }
        "INSTALLER_PATH=$($installers[0].FullName)" >> $env:GITHUB_ENV
    - name: Upload NSIS installer
      uses: actions/upload-artifact@v4
      with:
        name: app-windows-nsis
        path: ${{ env.INSTALLER_PATH }}
        if-no-files-found: error