<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symphony</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700&display=swap");

      :root {
        color-scheme: dark;
        --background: #222222;
        --tinted-background: #3c3c3c;
        --alternate-background: #2a2a2a;
        --foreground: #d9d9d9;
        --muted-foreground: #898989;
        --tinted-foreground: #bbbbbb;
        --primary: #ea7b36;
        --gray-50: #666666;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        color: var(--foreground);
        font-family: Inter, sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }

      html {
        background: transparent;
      }

      body {
        background: transparent;
        border-radius: 8px;
        position: relative;
        overflow: hidden;
        isolation: isolate;
        -webkit-app-region: drag;
      }

      .shell {
        background: var(--background);
        border-radius: inherit;
        height: 100%;
        position: relative;
        overflow: hidden;
        width: 100%;
        -webkit-app-region: drag;
      }

      .shell::before,
      .shell::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .shell::before {
        background-image: url("banner.jpg");
        background-position: center;
        background-size: cover;
        opacity: 0.74;
      }

      .shell::after {
        background:
          linear-gradient(
            90deg,
            rgba(18, 18, 18, 0.94) 0%,
            rgba(18, 18, 18, 0.78) 36%,
            rgba(18, 18, 18, 0.24) 100%
          ),
          linear-gradient(180deg, rgba(34, 34, 34, 0) 0%, rgba(34, 34, 34, 0.24) 100%);
      }

      .frame {
        height: 100%;
        width: 100%;
        padding: 50px 46px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
        position: relative;
        z-index: 1;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
        position: relative;
        z-index: 1;
      }

      .brand {
        color: var(--foreground);
        font-family: "Instrument Sans", Inter, sans-serif;
        font-size: 54px;
        font-weight: 700;
        letter-spacing: -1.2px;
        line-height: 1;
      }

      .version {
        color: var(--tinted-foreground);
        font-family: "Instrument Sans", Inter, sans-serif;
        font-size: 23px;
        font-weight: 500;
        line-height: 1;
        margin-top: 14px;
      }

      .org-mark {
        color: var(--tinted-foreground);
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .org-mark img {
        display: block;
        height: 28px;
        opacity: 0.82;
        width: auto;
      }

      .bottom {
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: relative;
        z-index: 1;
      }

      .status {
        color: var(--tinted-foreground);
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 420px;
      }

      .status-row {
        display: flex;
        align-items: baseline;
        gap: 18px;
      }

      .status-label {
        color: var(--foreground);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.1px;
      }

      .status-detail {
        color: var(--muted-foreground);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1px;
      }

      .legal {
        color: var(--gray-50);
        font-size: 12px;
        letter-spacing: 0.35px;
        line-height: 1.5;
        max-width: 560px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="frame">
        <div class="top">
          <div>
            <div class="brand">Symphony</div>
            <div class="version">Let's create something amazing.</div>
          </div>
          <div class="org-mark" aria-label="Nimbial">
            <img src="nimbial-logo-outline.svg" alt="" />
          </div>
        </div>
        <div class="bottom">
          <div class="status">
            <div class="status-row">
              <span id="status-text" class="status-label">Loading Symphony 1.1.5</span>
            </div>
          </div>
          <div class="legal">
            &copy; 2026 Nimbial. All rights reserved. Symphony and related marks
            are trademarks of Nimbial.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
